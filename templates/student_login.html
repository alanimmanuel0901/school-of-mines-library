{% extends 'base.html' %}

{% block title %}Student Login - School of Mines Library{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-graduate" style="font-size: 3rem; color: var(--accent-primary); margin-bottom: 1rem;"></i>
            <h2>Student Login</h2>
            <p>Sign in to access your account</p>
        </div>

        <form method="POST" action="{{ url_for('student_login') }}">
            <div class="form-group">
                <label class="form-label">Register Number</label>
                <input type="text" name="register_number" class="form-control" placeholder="Enter your register number" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('student_register') }}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
